<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 980" role="img" aria-labelledby="t d"><title id="t">白礁里撤離安置名冊</title><desc id="d">仿舊名冊掃描，列出四十六名安置戶，頁尾手寫廣播站尚有一人未報到。</desc><rect width="760" height="980" fill="#d9d2bf"/><rect x="55" y="38" width="650" height="900" fill="#f2ecd9" stroke="#716b5d" stroke-width="3"/><text x="380" y="88" text-anchor="middle" font-family="serif" font-size="30" fill="#302e29">白礁里撤離安置名冊</text><text x="90" y="125" font-family="monospace" font-size="16" fill="#49453d">日期：民國82年9月18日　總數：46</text><g stroke="#777064" stroke-width="1"><path d="M85 150h590M85 185h590M85 220h590M85 255h590M85 290h590M85 325h590M85 360h590M85 395h590M85 430h590M85 465h590M85 500h590M85 535h590M85 570h590M85 605h590M85 640h590M85 675h590M85 710h590M85 745h590M85 780h590"/><path d="M150 150v630M480 150v630"/></g><g font-family="monospace" font-size="15" fill="#575249"><text x="100" y="174">01</text><text x="170" y="174">林○發</text><text x="500" y="174">已安置</text><text x="100" y="209">02</text><text x="170" y="209">陳○妹</text><text x="500" y="209">已安置</text><text x="100" y="244">03</text><text x="170" y="244">許○山</text><text x="500" y="244">已安置</text><text x="100" y="279">04</text><text x="170" y="279">黃○清</text><text x="500" y="279">已安置</text><text x="100" y="314">05</text><text x="170" y="314">吳○珠</text><text x="500" y="314">已安置</text><text x="100" y="349">06</text><text x="170" y="349">張○義</text><text x="500" y="349">已安置</text><text x="100" y="384">…</text><text x="170" y="384">其餘名單略</text><text x="500" y="384">…</text><text x="100" y="769">46</text><text x="170" y="769">王○貴</text><text x="500" y="769">已安置</text></g><text x="100" y="845" font-family="cursive" font-size="23" fill="#51483f" transform="rotate(-2 100 845)">廣播站尚有一人未報到，請林員確認。</text><text x="120" y="892" font-family="cursive" font-size="22" fill="#6a5c4b" transform="rotate(1 120 892)">非安置戶，不補列。</text></svg>