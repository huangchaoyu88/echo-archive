figcaption><a href="mail.html">收件登記與轉錄摘要</a></figcaption></figure><figure class="verified-card paper-preview"><div><strong>特展改稿備忘錄</strong><p>原始稿：周月琴，社區廣播員。<br>核定稿：身分不詳女性。</p><small>MCP-2008-1008-E03</small></div><figcaption><a href="revision.html">改稿內容比對</a></figcaption></figure><figure class="verified-card paper-preview"><div><strong>事故後還原清單</strong><p>BJ_ORIGINAL：可讀取／暫不處理<br>A17_ARCHIVE：可讀取／暫不處理</p><small>SYS-2008-1018-R02</small></div><figcaption><a href="restore.html">還原範圍說明</a></figcaption></figure><figure class="verified-card paper-preview"><div><strong>網站組工作日誌</strong><p>名冊不包含她，不代表她不存在。</p><small>WEB-2008-1024-L01</small></div><figcaption><a href="log.html">林佩真工作日誌</a></figcaption></figure></div></article></div><footer class="footer">© 2008 岬角地方文化數位保存中心<br><span class="fiction">本網站內容為虛構。</span></footer></main></body></html>
